<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>衛星データ事例ブラウザ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#f5f5f3;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif}
:root{
  --teal:#1D9E75;--teal-light:#E1F5EE;--teal-mid:#5DCAA5;--teal-dark:#085041;
  --amber:#BA7517;--amber-light:#FAEEDA;
  --coral:#D85A30;--coral-light:#FAECE7;
  --bg:#ffffff;--bg2:#f5f5f3;--bg3:#ebebea;
  --text:#1a1a18;--text2:#6b6b67;--text3:#a0a09a;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --radius-md:8px;--radius-lg:12px;--radius-xl:20px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
    --text:#e8e8e2;--text2:#9e9e98;--text3:#6b6b65;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
  }
}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg)}
.header{padding:16px 16px 0;border-bottom:0.5px solid var(--border);background:var(--bg)}
.header-top{display:flex;align-items:center;margin-bottom:12px}
.logo{font-size:16px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px}
.logo-icon{width:26px;height:26px;background:var(--teal);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:14px;height:14px;fill:none;stroke:white;stroke-width:2}
.stats-row{display:flex;gap:8px;padding-bottom:12px}
.stat{flex:1;text-align:center;padding:8px 4px;background:var(--bg2);border-radius:var(--radius-md);cursor:pointer;transition:all .15s;border:0.5px solid transparent}
.stat:hover{border-color:var(--teal-mid);background:var(--teal-light)}
.stat:active{transform:scale(0.96)}
.stat[data-active="true"]{border-color:var(--teal-mid);background:var(--teal-light)}
.stat[data-active="true"] .stat-num,.stat[data-active="true"] .stat-label{color:var(--teal-dark)}
.stat-num{font-size:18px;font-weight:500;color:var(--text)}
.stat-label{font-size:11px;color:var(--text2);margin-top:1px}
.tabs{display:flex;border-bottom:0.5px solid var(--border)}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;user-select:none}
.tab.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:500}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}
.section{display:none;flex:1;flex-direction:column;overflow:hidden}
.section.active{display:flex}

/* ── スワイプ ── */
.swipe-wrap{display:flex;flex-direction:column;padding:12px 16px 8px;gap:10px;flex:1;overflow:hidden}
.progress-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .3s}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:3px}
.card-stack{position:relative;flex:1}
.swipe-card{position:absolute;inset:0;background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-xl);overflow:hidden;cursor:grab;user-select:none;display:flex;flex-direction:column}
.swipe-card:active{cursor:grabbing}
.swipe-card.behind{transform:scale(0.96) translateY(8px);opacity:0.6;pointer-events:none;z-index:0}
.swipe-card.front{z-index:1}
.hint-badge{position:absolute;top:14px;padding:5px 12px;border-radius:20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .08s;z-index:10;pointer-events:none}
.hint-like{right:14px;background:#E1F5EE;color:#085041;border:1.5px solid #5DCAA5}
.hint-pass{left:14px;background:#FAECE7;color:#711B0C;border:1.5px solid #F0997B}
.card-top{padding:16px 16px 12px;border-bottom:0.5px solid var(--border);flex-shrink:0}
.field-tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--teal-light);color:var(--teal-dark);font-weight:500;margin-bottom:8px}
.card-title{font-size:18px;font-weight:500;color:var(--text);line-height:1.35}
.card-body{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch}
.sec-label{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.04em;margin-bottom:6px}
.overview-text{font-size:14px;color:var(--text);line-height:1.75}
.metrics-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:14px}
.metric-item{background:var(--bg2);border-radius:var(--radius-md);padding:10px 6px;text-align:center}
.metric-label{font-size:10px;color:var(--text3);margin-bottom:6px}
.dot-row{display:flex;justify-content:center;gap:3px;margin-bottom:3px}
.dot{width:7px;height:7px;border-radius:50%}
.dot-tech{background:var(--teal)}.dot-biz{background:var(--amber)}.dot-empty{background:var(--border2)}
.metric-val{font-size:12px;color:var(--text2)}
.memo-wrap{margin-top:14px}
.memo-input{width:100%;border:0.5px solid var(--border2);border-radius:var(--radius-md);padding:9px 10px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg2);resize:none;height:72px;outline:none;line-height:1.5}
.memo-input:focus{border-color:var(--teal);background:var(--bg)}
.url-row{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:12px;color:var(--teal);cursor:pointer;word-break:break-all;text-decoration:none}
.url-row svg{width:12px;height:12px;stroke:var(--teal);fill:none;flex-shrink:0}
.action-row{display:flex;gap:10px;padding:10px 16px 12px;border-top:0.5px solid var(--border);flex-shrink:0}
.action-btn{flex:1;padding:13px 8px;border-radius:14px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;border:0.5px solid transparent}
.btn-pass{background:var(--coral-light);color:#4A1B0C;border-color:#F0997B}
.btn-like{background:var(--teal-light);color:var(--teal-dark);border-color:var(--teal-mid)}
.btn-pass:active,.btn-like:active{transform:scale(0.97)}

/* ── 空・完了 ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 24px;text-align:center;flex:1}
.empty-icon{width:52px;height:52px;background:var(--bg2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.empty-icon svg{width:26px;height:26px;stroke:var(--text3);fill:none;stroke-width:1.5}
.empty-title{font-size:16px;font-weight:500;color:var(--text);margin-bottom:6px}
.empty-text{font-size:13px;color:var(--text2);line-height:1.7}

/* ── 一覧 ── */
.filter-row{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;flex-shrink:0}
.filter-row::-webkit-scrollbar{display:none}
.chip{white-space:nowrap;padding:5px 12px;border-radius:20px;font-size:12px;border:0.5px solid var(--border2);cursor:pointer;color:var(--text2);background:var(--bg2);transition:all .12s}
.chip.active{background:var(--teal);color:white;border-color:var(--teal)}
.list-area{flex:1;overflow-y:auto;padding:0 16px 24px}
.list-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:12px;margin-bottom:8px;cursor:pointer;transition:background .12s}
.list-card:active{background:var(--bg2)}
.list-head{display:flex;align-items:flex-start;gap:6px;margin-bottom:6px}
.list-tags{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.badge-tag{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--teal-light);color:var(--teal-dark)}
.badge-done{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--bg2);color:var(--text3);border:0.5px solid var(--border2)}
.badge-liked{font-size:10px;padding:2px 7px;border-radius:20px;background:var(--teal-light);color:var(--teal-dark)}
.list-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px;line-height:1.4}
.list-desc{font-size:12px;color:var(--text2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.list-meta{display:flex;gap:10px;margin-top:6px}
.meta{font-size:11px;color:var(--text3)}

/* ── いいね ── */
.liked-card{background:var(--bg);border:0.5px solid var(--teal-mid);border-radius:var(--radius-lg);padding:14px;margin-bottom:8px;cursor:pointer}
.liked-memo{font-size:12px;color:var(--text2);padding:8px 10px;background:var(--bg2);border-radius:var(--radius-md);margin-top:8px;line-height:1.55}

/* ── アップロード ── */
.upload-zone{margin:16px;padding:28px 16px;border:1.5px dashed var(--border2);border-radius:14px;text-align:center;cursor:pointer;background:var(--bg2);transition:all .15s}
.upload-zone:hover{border-color:var(--teal);background:var(--teal-light)}
.upload-icon{width:44px;height:44px;margin:0 auto 12px;background:var(--teal-light);border-radius:50%;display:flex;align-items:center;justify-content:center}
.upload-icon svg{width:22px;height:22px;stroke:var(--teal);fill:none;stroke-width:1.5}
.upload-text{font-size:15px;color:var(--text2);font-weight:500}
.upload-hint{font-size:12px;color:var(--text3);margin-top:4px}
.format-box{margin:0 16px 12px;padding:12px;background:var(--bg2);border-radius:var(--radius-md);border:0.5px solid var(--border)}
.format-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
.col-tags{display:flex;flex-wrap:wrap;gap:4px}
.col-tag{font-size:11px;padding:3px 7px;background:var(--bg);border:0.5px solid var(--border2);border-radius:20px;color:var(--text2)}
.col-tag.req{background:var(--teal-light);border-color:var(--teal-mid);color:var(--teal-dark)}
.sample-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 16px 16px}
.sample-btn{padding:11px;background:var(--bg2);border-radius:var(--radius-md);font-size:13px;color:var(--text2);cursor:pointer;text-align:center;border:0.5px solid var(--border)}
.clear-btn{padding:11px;background:var(--coral-light);border-radius:var(--radius-md);font-size:13px;color:#4A1B0C;cursor:pointer;text-align:center;border:0.5px solid #F0997B}
.dl-btn{display:block;text-align:center;margin:0 16px 12px;padding:11px;border:0.5px solid var(--teal-mid);border-radius:var(--radius-md);font-size:13px;color:var(--teal);cursor:pointer;background:var(--teal-light)}
.no-data{padding:40px 16px;text-align:center;font-size:14px;color:var(--text3);line-height:1.7}

/* ── モーダル ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:0 16px 40px;transform:translateY(100%);transition:transform .25s}
.overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 16px}
.modal-field-tag{display:inline-block;font-size:11px;padding:3px 9px;border-radius:20px;background:var(--teal-light);color:var(--teal-dark);font-weight:500;margin-bottom:8px}
.modal-title{font-size:19px;font-weight:500;color:var(--text);margin-bottom:8px;line-height:1.4}
.modal-desc{font-size:14px;color:var(--text2);line-height:1.75;margin-bottom:14px}
.modal-sec-label{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;padding-bottom:4px;border-bottom:0.5px solid var(--border)}
.modal-metrics{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.modal-save-btn{width:100%;padding:13px;background:var(--teal);color:white;border:none;border-radius:var(--radius-lg);font-size:15px;font-weight:500;cursor:pointer;margin-top:10px;transition:opacity .15s}
.modal-save-btn:active{opacity:.8}
.modal-action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.modal-btn{padding:11px;border-radius:var(--radius-lg);font-size:13px;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2)}
.modal-btn.done-active{background:var(--coral-light);color:#4A1B0C;border-color:#F0997B}
.modal-btn.like-active{background:var(--teal-light);color:var(--teal-dark);border-color:var(--teal-mid)}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        衛星データ事例ブラウザ
      </div>
    </div>
    <div class="stats-row">
      <div class="stat" onclick="statJump('all')">
        <div class="stat-num" id="totalCount">0</div>
        <div class="stat-label">事例</div>
      </div>
      <div class="stat" onclick="statJump('done')">
        <div class="stat-num" id="doneCount">0</div>
        <div class="stat-label">確認済み</div>
      </div>
      <div class="stat" onclick="statJump('liked')">
        <div class="stat-num" id="likedCount">0</div>
        <div class="stat-label">いいね</div>
      </div>
      <div class="stat" onclick="statJump('undone')">
        <div class="stat-num" id="remainCount">0</div>
        <div class="stat-label">未確認</div>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="switchTab('swipe')">スワイプ</div>
      <div class="tab" onclick="switchTab('list')">一覧</div>
      <div class="tab" onclick="switchTab('liked')">いいね</div>
      <div class="tab" onclick="switchTab('upload')">読込</div>
    </div>
  </div>

  <div class="content">
    <div class="section active" id="sec-swipe"></div>

    <div class="section" id="sec-list">
      <div class="filter-row" id="filter-row" data-active="all"></div>
      <div class="list-area" id="list-area"></div>
    </div>

    <div class="section" id="sec-liked">
      <div class="list-area" id="liked-area"></div>
    </div>

    <div class="section" id="sec-upload">
      <div class="upload-zone" onclick="document.getElementById('csvInput').click()">
        <div class="upload-icon">
          <svg viewBox="0 0 24 24"><polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/><path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/></svg>
        </div>
        <div class="upload-text">CSVファイルをアップロード</div>
        <div class="upload-hint">タップしてファイルを選択</div>
        <input type="file" id="csvInput" accept=".csv" style="display:none" onchange="loadCSV(event)">
      </div>
      <div class="format-box">
        <div class="format-title">CSVの列（1行目はヘッダー行）</div>
        <div class="col-tags">
          <span class="col-tag req">分野</span>
          <span class="col-tag req">事例名</span>
          <span class="col-tag req">概要</span>
          <span class="col-tag">技術難易度(1-5)</span>
          <span class="col-tag">営業難易度(1-5)</span>
          <span class="col-tag">キャッシュまで(月)</span>
          <span class="col-tag">参考URL</span>
        </div>
      </div>
      <div class="dl-btn" onclick="downloadTemplate()">サンプルCSVをダウンロード</div>
      <div class="sample-row">
        <div class="sample-btn" onclick="loadSample()">サンプル8件を読み込む</div>
        <div class="clear-btn" onclick="clearData()">データを全消去</div>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="closeModalOverlay(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
const SAMPLE = [
  {分野:'農業',事例名:'果樹園NDVIモニタリング',概要:'Sentinel-2のNDVIで樹木の生育状況を週次監視。山間部の梨・ブドウ農家向けにLINE通知で提供。収穫時期の予測と病害検知に活用。月額2〜5万円のサブスク想定。',技術難易度:3,営業難易度:2,キャッシュまで:3,参考URL:''},
  {分野:'不動産',事例名:'空き地・遊休農地スクリーニング',概要:'BSIとNDVIの組み合わせで未管理地を自動検出。競合より早く土地オーナーにアプローチできる土地仕入れ支援ツール。不動産業者への月額課金モデル。',技術難易度:3,営業難易度:3,キャッシュまで:4,参考URL:''},
  {分野:'自治体',事例名:'無断開発・盛土モニタリング',概要:'京田辺市モデルを横展開。NDVIとNDBIの変化検知で不法開発を自動アラート。担当職員の巡回業務を削減。自治体への年間契約。',技術難易度:4,営業難易度:4,キャッシュまで:8,参考URL:''},
  {分野:'農業',事例名:'水稲作付面積推定',概要:'SAR（合成開口レーダー）で水田を識別し作付面積を推定。JAや行政の補助金申請確認業務を自動化。',技術難易度:4,営業難易度:3,キャッシュまで:6,参考URL:''},
  {分野:'保険',事例名:'農業保険の被害査定支援',概要:'台風・大雨後の植生ダメージをNDVIで定量化。損保会社の現地査定コストを削減するSaaS。初期POC費用＋月額課金。',技術難易度:3,営業難易度:4,キャッシュまで:10,参考URL:''},
  {分野:'林業',事例名:'森林カーボンクレジット計測',概要:'森林のバイオマス変化をSentinel-2で継続監視。Jクレジット申請に必要な計測レポートを自動生成。単価高いが営業難易度も高い。',技術難易度:5,営業難易度:4,キャッシュまで:12,参考URL:''},
  {分野:'インフラ',事例名:'太陽光パネル劣化検知',概要:'赤外・可視光バンドの組み合わせで大規模メガソーラーの劣化パネルを特定。メンテナンス優先度マップを提供。',技術難易度:4,営業難易度:3,キャッシュまで:5,参考URL:''},
  {分野:'ESG',事例名:'企業緑地スコアリング',概要:'工場・物流拠点周辺の植生変化を継続記録。ESG開示要件への対応を支援するスコアリングレポートサービス。大企業向けで単価大きい。',技術難易度:3,営業難易度:5,キャッシュまで:9,参考URL:''},
];

// ── ストレージ（localStorage） ──
const LS_CASES = 'sat_cases';
const LS_META  = 'sat_meta';

let cases = [];
let meta  = {};

function loadFromStorage() {
  try {
    const c = localStorage.getItem(LS_CASES);
    const m = localStorage.getItem(LS_META);
    if (c) cases = JSON.parse(c);
    if (m) meta  = JSON.parse(m);
  } catch(e) {}
}
function saveCases() {
  try { localStorage.setItem(LS_CASES, JSON.stringify(cases)); } catch(e) {}
}
function saveMeta() {
  try { localStorage.setItem(LS_META, JSON.stringify(meta)); } catch(e) {}
}

// ── ヘルパー ──
function getM(id) {
  if (!meta[id]) meta[id] = {liked:false, done:false, memo:''};
  return meta[id];
}
function getDiff(c, key) {
  const k = Object.keys(c).find(k => k.startsWith(key));
  return Math.min(5, Math.max(0, parseInt(c[k]) || 0));
}
function diffLabel(n) { return n <= 0 ? '—' : n <= 2 ? '低' : n <= 3 ? '中' : '高'; }
function cashLabel(v) { const n = parseInt(v) || 0; return n ? n + 'ヶ月' : '—'; }
function makeDots(n, cls, max=5) {
  let h = '';
  for (let i = 0; i < max; i++) h += `<div class="dot ${i < n ? 'dot-' + cls : 'dot-empty'}"></div>`;
  return h;
}
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── 統計表示 ──
function updateStats() {
  document.getElementById('totalCount').textContent  = cases.length;
  document.getElementById('doneCount').textContent   = cases.filter(c => getM(c._id).done).length;
  document.getElementById('likedCount').textContent  = cases.filter(c => getM(c._id).liked).length;
  document.getElementById('remainCount').textContent = cases.filter(c => !getM(c._id).done).length;
}

// ── ボックスクリックでジャンプ ──
function statJump(type) {
  document.querySelectorAll('.stat').forEach(s => s.removeAttribute('data-active'));
  event.currentTarget.setAttribute('data-active', 'true');
  if (type === 'liked') { switchTab('liked'); return; }
  switchTab('list');
  const map = {all:'all', done:'done', undone:'undone'};
  setFilter(map[type] || 'all');
}

// ── タブ切替 ──
function switchTab(tab) {
  const tabs = ['swipe','list','liked','upload'];
  tabs.forEach((t, i) => {
    document.querySelectorAll('.tab')[i].classList.toggle('active', t === tab);
    document.getElementById('sec-' + t).classList.toggle('active', t === tab);
  });
  document.querySelectorAll('.stat').forEach(s => s.removeAttribute('data-active'));
  if (tab === 'list')  renderList();
  if (tab === 'liked') renderLiked();
}

    cardsHtml += `<div class="swipe-card ${isBack ? 'behind' : 'front'}" id="card-${c._id}" data-id="${escHtml(c._id)}">

      <div class="hint-badge hint-pass" id="hp-${c._id}">確認済み ✓</div>
      <div class="card-top">
        <div class="field-tag">${escHtml(c['分野'] || '—')}</div>

      </div>
      <div class="card-body">

        <div class="metrics-grid">

            <div class="dot-row">${makeDots(tech,'tech')}</div>

          </div>

            <div class="metric-label">営業難易度</div>
            <div class="dot-row">${makeDots(biz,'biz')}</div>
            <div class="metric-val">${diffLabel(biz)}</div>
          </div>

            <div class="metric-label">キャッシュまで</div>

            <div class="metric-val">${cashLabel(cash)}</div>
          </div>
        </div>
        ${url ? `<a class="url-row" href="${escHtml(url)}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>

function setupSwipe(id) {
  const card = document.getElementById('card-' + id);
  if (!card) return;
  let sx = 0, sy = 0, active = false;

  const start = e => {
    active = true;
    const t = e.touches ? e.touches[0] : e;
    sx = t.clientX; sy = t.clientY;
    card.style.transition = 'none';
  };
  const move = e => {
    if (!active) return;
    if (e.cancelable) e.preventDefault();
    const t  = e.touches ? e.touches[0] : e;
    const dx = t.clientX - sx;
    const dy = (t.clientY - sy) * 0.25;
    card.style.transform = `translateX(${dx}px) translateY(${dy}px) rotate(${dx * 0.07}deg)`;
    const hl = document.getElementById('hl-' + id);
    const hp = document.getElementById('hp-' + id);
    if (dx > 30)       { hl.style.opacity = Math.min((dx - 30) / 60, 1); hp.style.opacity = 0; }
    else if (dx < -30) { hp.style.opacity = Math.min((-dx - 30) / 60, 1); hl.style.opacity = 0; }
    else               { hl.style.opacity = 0; hp.style.opacity = 0; }
  };
  const end = e => {
    if (!active) return;
    active = false;
    const t  = e.changedTouches ? e.changedTouches[0] : e;
    const dx = t.clientX - sx;
    card.style.transition = 'transform .25s, opacity .25s';
    if (dx > 80)       flyOut(id, 'right');
    else if (dx < -80) flyOut(id, 'left');
    else               card.style.transform = '';
  };

  card.addEventListener('touchstart', start, {passive: true});
  card.addEventListener('touchmove',  move,  {passive: false});
  card.addEventListener('touchend',   end);
  card.addEventListener('mousedown',  start);
  window.addEventListener('mousemove', move);
  window.addEventListener('mouseup',   end);
}

function flyOut(id, dir) {
  const card = document.getElementById('card-' + id);
  if (card) {
    card.style.transform = `translateX(${dir === 'right' ? 600 : -600}px) rotate(${dir === 'right' ? 25 : -25}deg)`;
    card.style.opacity = '0';
  }
  setTimeout(() => dir === 'right' ? markLiked(id) : markDone(id), 260);
}

function markDone(id) {
  const el = document.getElementById('memo-' + id);
  const m  = getM(id);
  if (el) m.memo = el.value;
  m.done = true;
  saveMeta();
  updateStats(); renderSwipe(); renderList(); renderLiked();
}
function markLiked(id) {
  const el = document.getElementById('memo-' + id);
  const m  = getM(id);
  if (el) m.memo = el.value;
  m.liked = true;
  m.done  = true;
  saveMeta();
  updateStats(); renderSwipe(); renderList(); renderLiked();
}

// ── 一覧 ──
function renderList() {
  const fields = [...new Set(cases.map(c => c['分野']).filter(Boolean))];
  const active = document.getElementById('filter-row').dataset.active || 'all';

  document.getElementById('filter-row').innerHTML =
    `<div class="chip ${active==='all'?'active':''}" onclick="setFilter('all')">すべて</div>` +
    fields.map(f => `<div class="chip ${active===f?'active':''}" onclick="setFilter('${escHtml(f)}')">${escHtml(f)}</div>`).join('') +
    `<div class="chip ${active==='done'?'active':''}" onclick="setFilter('done')">確認済み</div>` +
    `<div class="chip ${active==='undone'?'active':''}" onclick="setFilter('undone')">未確認</div>` +
    `<div class="chip ${active==='liked'?'active':''}" onclick="setFilter('liked')">いいね</div>`;

  let list = cases;
  if      (active === 'done')   list = cases.filter(c =>  getM(c._id).done);
  else if (active === 'undone') list = cases.filter(c => !getM(c._id).done);
  else if (active === 'liked')  list = cases.filter(c =>  getM(c._id).liked);
  else if (active !== 'all')    list = cases.filter(c => c['分野'] === active);

  const area = document.getElementById('list-area');
  if (!list.length) { area.innerHTML = `<div class="no-data">該当する事例がありません</div>`; return; }

  area.innerHTML = list.map(c => {
    const m    = getM(c._id);
    const tech = getDiff(c, '技術');
    const cashKey = Object.keys(c).find(k => k.startsWith('キャッシュ'));
    const cash = cashKey ? parseInt(c[cashKey]) || 0 : 0;
    return `<div class="list-card" onclick="openModal('${c._id}')">
      <div class="list-head">
        <div class="list-tags"><span class="badge-tag">${escHtml(c['分野']||'—')}</span></div>
        ${m.done  ? '<span class="badge-done">確認済み</span>' : ''}
        ${m.liked ? '<span class="badge-liked">♡</span>' : ''}
      </div>
      <div class="list-title">${escHtml(c['事例名']||'—')}</div>
      <div class="list-desc">${escHtml(c['概要']||'')}</div>
      <div class="list-meta">
        <span class="meta">技術 ${diffLabel(tech)}</span>
        ${cash ? `<span class="meta">現金化 ${cash}ヶ月</span>` : ''}
        ${m.memo ? '<span class="meta">メモあり</span>' : ''}
      </div>
    </div>`;
  }).join('');
}
function setFilter(f) {
  document.getElementById('filter-row').dataset.active = f;
  renderList();
}

// ── モーダル ──

    <div class="modal-title">${escHtml(c['事例名']||'—')}</div>
    <div class="modal-desc">${escHtml(c['概要']||'—').replace(/\n/g,'<br>')}</div>
    ${url ? `<a class="url-row" href="${escHtml(url)}" target="_blank" rel="noopener" style="margin-bottom:14px">
      <svg viewBox="0 0 24 24" stroke-width="1.5"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      ${escHtml(url)}</a>` : ''}
    <div class="modal-sec-label">評価指標</div>
    <div class="modal-metrics">
      <div class="metric-item"><div class="metric-label">技術難易度</div><div class="dot-row">${makeDots(tech,'tech')}</div><div class="metric-val">${diffLabel(tech)}</div></div>
      <div class="metric-item"><div class="metric-label">営業難易度</div><div class="dot-row">${makeDots(biz,'biz')}</div><div class="metric-val">${diffLabel(biz)}</div></div>
      <div class="metric-item"><div class="metric-label">キャッシュまで</div><div style="margin-top:12px"></div><div class="metric-val">${cashLabel(cash)}</div></div>
    </div>
    <div class="modal-sec-label">メモ・コメント</div>
    <textarea class="memo-input" id="modal-memo-${id}" style="height:80px" placeholder="気づきや考えを残す...">${escHtml(m.memo||'')}</textarea>
    <div class="modal-action-grid">
      <button class="modal-btn ${m.done && !m.liked ? 'done-active' : ''}" onclick="modalDone('${id}')">✓ 確認済み</button>
      <button class="modal-btn ${m.liked ? 'like-active' : ''}" onclick="modalLike('${id}')">♡ いいね</button>

    <button class="modal-save-btn" onclick="saveModalMemo('${id}')">メモを保存して閉じる</button>`;

}
function closeModalOverlay(e) {
  if (e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}
function saveModalMemo(id) {
  const el = document.getElementById('modal-memo-' + id);
  const m  = getM(id);
  if (el) m.memo = el.value;
  saveMeta(); renderList(); renderLiked();
  document.getElementById('overlay').classList.remove('open');
}
function modalDone(id) {
  const el = document.getElementById('modal-memo-' + id);
  const m  = getM(id);
  if (el) m.memo = el.value;
  m.done = !m.done;
  if (!m.done) m.liked = false;
  saveMeta(); updateStats(); renderSwipe(); renderList(); renderLiked();
  document.getElementById('overlay').classList.remove('open');
}
function modalLike(id) {
  const el = document.getElementById('modal-memo-' + id);
  const m  = getM(id);
  if (el) m.memo = el.value;
  m.liked = !m.liked;
  if (m.liked) m.done = true;
  saveMeta(); updateStats(); renderSwipe(); renderList(); renderLiked();
  document.getElementById('overlay').classList.remove('open');
}

// ── CSV ──
function parseCSVRow(row) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < row.length; i++) {
    const ch = row[i];
    if (ch === '"' && row[i+1] === '"') { cur += '"'; i++; }
    else if (ch === '"') { inQ = !inQ; }
    else if (ch === ',' && !inQ) { res.push(cur); cur = ''; }
    else cur += ch;
  }
  res.push(cur);
  return res;
}
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return [];
  const headers = parseCSVRow(lines[0]);
  return lines.slice(1).map((l, i) => {
    const v = parseCSVRow(l);
    const o = {_id: 'c_' + Date.now() + '_' + i};
    headers.forEach((h, j) => o[h.trim()] = (v[j] || '').trim());
    return o;
  }).filter(o => o['分野'] || o['事例名']);
}
function loadCSV(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const parsed = parseCSV(ev.target.result);
    if (!parsed.length) { alert('CSVを読み込めませんでした。形式を確認してください。'); return; }
    cases = parsed;
    saveCases(); updateStats(); renderSwipe(); renderList(); renderLiked();
    switchTab('swipe');
    alert(parsed.length + '件の事例を読み込みました！');
  };
  reader.readAsText(file, 'UTF-8');
}
function downloadTemplate() {
  const h = '分野,事例名,概要,技術難易度(1-5),営業難易度(1-5),キャッシュまで(月),参考URL';
  const r = '農業,NDVIモニタリング,果樹園の生育状況を週次監視しLINEで通知,3,2,3,https://example.com';
  const blob = new Blob([h + '\n' + r], {type: 'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'sat_cases_template.csv';
  a.click();
}
async function loadSample() {
  cases = SAMPLE.map((c, i) => ({...c, _id: 's_' + i}));
  saveCases(); updateStats(); renderSwipe(); renderList(); renderLiked();
  switchTab('swipe');
}
async function clearData() {
  if (!confirm('全データ（事例・いいね・コメント）を消去しますか？')) return;
  cases = []; meta = {};
  saveCases(); saveMeta(); updateStats(); renderSwipe(); renderList(); renderLiked();
}

loadFromStorage();
